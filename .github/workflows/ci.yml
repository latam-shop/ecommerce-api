name: CI - Quality & Build

on:
  pull_request:
    branches: [ dev, pre, prod ]
  push:
    branches: [ dev, pre, prod ]

jobs:
  validate-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Check Code Formatting (Spotless)
        if: github.event_name == 'pull_request'
        run: ./mvnw spotless:check -ntp

      - name: Check Code Quality (Checkstyle)
        if: github.event_name == 'pull_request'
        run: ./mvnw checkstyle:check -ntp

      - name: Run Tests with Infisical
        if: github.event_name == 'pull_request'
        run: infisical run --env=test -- ./mvnw test -ntp
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN_TEST }}

      - name: Verify no merge conflicts markers
        if: github.event_name == 'pull_request'
        run: |
          if grep -rE "<<<<<<<|=======|>>>>>>>" src/; then
            echo "Conflict markers detected!"
            exit 1
          fi

      - name: Set Infisical Environment
        if: github.event_name == 'push'
        id: set-env
        run: |
          if [[ "${{ github.ref_name }}" == "prod" ]]; then
          echo "env_name=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "pre" ]]; then
          echo "env_name=staging" >> $GITHUB_OUTPUT
          else
          echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Final Package
        if: github.event_name == 'push'
        run: |
          infisical run --env=${{ steps.set-env.outputs.env_name }} -- ./mvnw clean package -DskipTests -ntp
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}

      - name: Upload Build Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-release
          path: target/*.jar
          retention-days: 1